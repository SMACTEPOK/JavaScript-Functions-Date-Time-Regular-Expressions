<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Завдання 3.1 - Пошук дат РРРР-ММ-ДД</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #e7e9ea;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background-color: #16181c;
            border-radius: 16px;
            padding: 30px;
            width: 600px;
            border: 1px solid #2f3336;
        }
        h2 {
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2f3336;
        }
        label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 500;
        }
        textarea {
            width: 100%;
            padding: 10px;
            background-color: #000;
            border: 1px solid #2f3336;
            border-radius: 8px;
            color: #e7e9ea;
            font-size: 14px;
            font-family: monospace;
            resize: vertical;
            margin-bottom: 15px;
        }
        textarea:focus { outline: none; border-color: #1d9bf0; }
        button {
            width: 100%;
            padding: 10px;
            background-color: #1d9bf0;
            border: none;
            border-radius: 9999px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background-color: #1a8cd8; }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #000;
            border-radius: 12px;
            border: 1px solid #2f3336;
        }
        .found-date {
            display: inline-block;
            background-color: #1d9bf0;
            padding: 4px 10px;
            margin: 4px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 14px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #71767b;
            text-decoration: none;
            font-size: 13px;
        }
        .back-link:hover { color: #1d9bf0; }
        .example {
            font-size: 12px;
            color: #71767b;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Завдання 3.1. Пошук дат (РРРР-ММ-ДД)</h2>
        <label>Введіть текст для пошуку дат:</label>
        <textarea id="textInput" rows="6" placeholder="Наприклад: Події: 2024-12-25, 2023-01-15, невалідна 2025-13-01"></textarea>
        <div class="example">Формат: РРРР-ММ-ДД (перевіряється валідність дати)</div>
        <button id="findBtn">Знайти дати</button>
        <div class="result" id="result">
            <div id="datesList"></div>
        </div>
        <a href="index.html" class="back-link">← На головну</a>
    </div>
    <script>
        function isValidDate(year, month, day) {
            const date = new Date(year, month - 1, day);
            return date.getFullYear() === year && date.getMonth() === month - 1 && date.getDate() === day;
        }
       
        function findDates(text) {
            const regex = /\b(\d{4})-(\d{2})-(\d{2})\b/g;
            const matches = [];
            let match;
           
            while ((match = regex.exec(text)) !== null) {
                const year = parseInt(match[1], 10);
                const month = parseInt(match[2], 10);
                const day = parseInt(match[3], 10);
               
                if (isValidDate(year, month, day)) {
                    matches.push(match[0]);
                }
            }
            return matches;
        }
       
        const textInput = document.getElementById('textInput');
        const findBtn = document.getElementById('findBtn');
        const datesList = document.getElementById('datesList');
       
        function find() {
            const text = textInput.value;
            if (text.trim() === '') {
                datesList.innerHTML = '<p style="color: #71767b;">Введіть текст для пошуку</p>';
                return;
            }
           
            const dates = findDates(text);
            if (dates.length === 0) {
                datesList.innerHTML = '<p style="color: #71767b;">Валідних дат у форматі РРРР-ММ-ДД не знайдено</p>';
            } else {
                let html = '<div style="margin-bottom: 8px;">Знайдені дати:</div>';
                for (let date of dates) {
                    html += `<span class="found-date">${date}</span>`;
                }
                datesList.innerHTML = html;
            }
        }
       
        findBtn.addEventListener('click', find);
    </script>
</body>
</html>
