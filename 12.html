<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Завдання 1.2 - Таблиця з рядків</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #e7e9ea;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background-color: #16181c;
            border-radius: 16px;
            padding: 30px;
            width: 550px;
            border: 1px solid #2f3336;
        }
        h2 {
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2f3336;
        }
        label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 500;
        }
        textarea {
            width: 100%;
            padding: 10px;
            background-color: #000;
            border: 1px solid #2f3336;
            border-radius: 8px;
            color: #e7e9ea;
            font-size: 14px;
            font-family: monospace;
            resize: vertical;
            margin-bottom: 15px;
        }
        textarea:focus { outline: none; border-color: #1d9bf0; }
        button {
            width: 100%;
            padding: 10px;
            background-color: #1d9bf0;
            border: none;
            border-radius: 9999px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover { background-color: #1a8cd8; }
        .reset-btn {
            background-color: #2f3336;
            margin-top: 8px;
        }
        .table-container {
            margin-top: 20px;
            padding: 15px;
            background-color: #000;
            border-radius: 12px;
            border: 1px solid #2f3336;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        td {
            border: 1px solid #2f3336;
            padding: 10px;
            text-align: left;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #71767b;
            text-decoration: none;
            font-size: 13px;
        }
        .back-link:hover { color: #1d9bf0; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Завдання 1.2. Таблиця з рядків</h2>
        <label>Введіть рядки (кожен з нового рядка):</label>
        <textarea id="rowsInput" rows="5" placeholder="Рядок 1&#10;Рядок 2&#10;Рядок 3"></textarea>
        <button id="createBtn">Створити таблицю</button>
        <button id="resetBtn" class="reset-btn">Очистити</button>
        <div class="table-container" id="tableContainer"></div>
        <a href="index.html" class="back-link">← На головну</a>
    </div>
    <script>
        function createTableFromStrings(stringsArray) {
            if (!stringsArray || stringsArray.length === 0) return '';
            let html = '<table>';
            for (let i = 0; i < stringsArray.length; i++) {
                html += `<tr><td>${escapeHtml(stringsArray[i])}</td></tr>`;
            }
            html += '</table>';
            return html;
        }
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        const rowsInput = document.getElementById('rowsInput');
        const createBtn = document.getElementById('createBtn');
        const resetBtn = document.getElementById('resetBtn');
        const tableContainer = document.getElementById('tableContainer');
        function createTable() {
            const text = rowsInput.value;
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
            if (lines.length === 0) {
                tableContainer.innerHTML = '<p style="color: #71767b;">Немає рядків для відображення</p>';
                return;
            }
            const tableHtml = createTableFromStrings(lines);
            tableContainer.innerHTML = tableHtml;
        }
        function reset() {
            rowsInput.value = '';
            tableContainer.innerHTML = '';
        }
        createBtn.addEventListener('click', createTable);
        resetBtn.addEventListener('click', reset);
    </script>
</body>
</html>
